name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check, lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: perennial-leagues

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: perennial-leagues/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Stub values so Next.js resolves env vars at build time without
          # calling any external service. The sitemap fetch fails gracefully.
          NEXT_PUBLIC_BASE_URL: https://placeholder.vercel.app
          POSTGRES_URL: postgresql://placeholder:placeholder@placeholder:5432/placeholder
          NEXTAUTH_SECRET: placeholder
          ADMIN_USER: placeholder
          ADMIN_PASSWORD: placeholder
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
